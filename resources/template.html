<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{PAGE_TITLE}}</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #161a22;
        --panel-2: #1c2230;
        --border: #262d3b;
        --text: #e6e8ee;
        --muted: #8b94a7;
        --accent: #7aa2ff;
        --accent-2: #9ae6b4;
        --code-bg: #0b0d12;
        --code-fg: #e6e8ee;
        --btn: #2a3142;
        --btn-hover: #38415a;
        --shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
        line-height: 1.55;
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 24px 80px;
      }
      h1 { font-size: 28px; margin: 0 0 6px; }
      h2 { font-size: 20px; margin: 36px 0 10px; color: var(--accent); }
      p, li { color: var(--text); }
      .subtitle { color: var(--muted); margin: 0 0 24px; }
      .vars {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px 18px 8px;
        position: sticky;
        top: 12px;
        z-index: 5;
        box-shadow: var(--shadow);
      }
      .vars h2 { margin: 0 0 12px; font-size: 16px; color: var(--accent-2); }
      .vars-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px 14px;
      }
      .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
      .field label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
      }
      .field input {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        outline: none;
        transition: border-color 120ms ease;
      }
      .field input:focus { border-color: var(--accent); }
      .reset {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
        margin-top: 6px;
      }
      .reset:hover { color: var(--text); border-color: var(--accent); }

      .block {
        position: relative;
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin: 10px 0 18px;
        overflow: hidden;
      }
      .block .lang {
        position: absolute;
        top: 8px;
        left: 12px;
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .block pre {
        margin: 0;
        padding: 30px 14px 14px;
        overflow-x: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        color: var(--code-fg);
        white-space: pre;
      }
      .copy {
        position: absolute;
        top: 6px;
        right: 6px;
        background: var(--btn);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 10px;
        font-size: 11px;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: background 120ms ease, color 120ms ease;
      }
      .copy:hover { background: var(--btn-hover); }
      .copy.copied { background: #234e3c; color: #c6f6d5; border-color: #2f6b50; }
      hr.sep { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
      code.inline {
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1px 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12.5px;
      }
    </style>
  </head>
  <body>
    <h1>{{PAGE_TITLE}}</h1>
    <p class="subtitle">{{PAGE_SUBTITLE}}</p>

    <section class="vars" aria-label="Variables">
      <h2>Variables</h2>
      <div class="vars-grid">
        <!--
          VARIABLES_BLOCK
          One <div class="field">…</div> per variable. Example:
            <div class="field">
              <label for="db_name">database name</label>
              <input id="db_name" data-var="db_name" value="my_new_db" autocomplete="off" />
            </div>
        -->
        {{VARIABLES}}
      </div>
      <button class="reset" id="reset-btn" type="button">Reset to defaults</button>
    </section>

    <!--
      CONTENT_BLOCK
      Insert <h2>…</h2>, <p>…</p>, and code blocks here. Each code block:

        <div class="block">
          <span class="lang">bash</span>
          <button class="copy" type="button">Copy</button>
          <pre><code data-template="…command with {{var}} placeholders…"></code></pre>
        </div>

      Use {{var_name}} inside data-template to reference inputs by their data-var attribute.
      For literal '<' or '>' inside data-template, write &lt; and &gt;.
    -->
    {{CONTENT}}

    <script>
      (function () {
        // DEFAULTS_BLOCK: { var_name: "default value", … }
        const DEFAULTS = {{DEFAULTS_JSON}};

        const inputs = document.querySelectorAll("input[data-var]");
        const codes = document.querySelectorAll("code[data-template]");

        function readVars() {
          const vars = {};
          inputs.forEach((i) => {
            vars[i.dataset.var] = i.value;
          });
          return vars;
        }

        function decode(html) {
          const t = document.createElement("textarea");
          t.innerHTML = html;
          return t.value;
        }

        function render() {
          const vars = readVars();
          codes.forEach((c) => {
            const tpl = decode(c.getAttribute("data-template"));
            const out = tpl.replace(/\{\{(\w+)\}\}/g, (_, key) =>
              Object.prototype.hasOwnProperty.call(vars, key) ? vars[key] : "{{" + key + "}}"
            );
            c.textContent = out;
          });
        }

        inputs.forEach((i) => i.addEventListener("input", render));

        document.querySelectorAll(".copy").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const code = btn.parentElement.querySelector("code");
            const text = code ? code.textContent : "";
            try {
              await navigator.clipboard.writeText(text);
            } catch (e) {
              const ta = document.createElement("textarea");
              ta.value = text;
              ta.style.position = "fixed";
              ta.style.opacity = "0";
              document.body.appendChild(ta);
              ta.select();
              try { document.execCommand("copy"); } catch (_) {}
              document.body.removeChild(ta);
            }
            const original = btn.textContent;
            btn.textContent = "Copied";
            btn.classList.add("copied");
            setTimeout(() => {
              btn.textContent = original;
              btn.classList.remove("copied");
            }, 1200);
          });
        });

        document.getElementById("reset-btn").addEventListener("click", () => {
          inputs.forEach((i) => {
            i.value = DEFAULTS[i.dataset.var] ?? "";
          });
          render();
        });

        render();
      })();
    </script>
  </body>
</html>
